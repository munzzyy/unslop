name: Feature request
description: A new buzzword/phrase/pattern to catch, or a new capability for the CLI.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's missing
      description: What can't you do today, or what AI tell does noslop miss?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: If this is a new buzzword/phrase/pattern, a real example of it showing up in AI output (and, if you can, a sentence where it shouldn't fire).
      render: text
    validations:
      required: false
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How you'd expect this to work, if you have a preference. Not required.
    validations:
      required: false
