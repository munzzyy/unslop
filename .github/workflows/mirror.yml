name: Mirror to GitLab
on:
  push:
    branches: [main]
    tags: ['**']
  workflow_dispatch:
permissions:
  contents: read
concurrency: mirror
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Push to GitLab
        env:
          KEY: ${{ secrets.GITLAB_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
          # Stopgap: the GitLab project still lives at its old path (flight-unreached/unslop).
          # Push there so the backup stays green; flip to munzzyy/noslop once the
          # GitLab-side transfer + rename lands.
          git remote add gitlab git@gitlab.com:flight-unreached/unslop.git
          GIT_SSH_COMMAND='ssh -i ~/.ssh/mirror_key' git push gitlab HEAD:refs/heads/main --tags --force
