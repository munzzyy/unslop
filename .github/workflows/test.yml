name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.11", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: python -m pytest tests/ -q

  # The README sells a linter for AI-sounding prose, so it has to keep passing
  # that linter. This fails the build the day the docs start sounding like a bot.
  readme-dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - run: python noslop.py --no-config README.md
      # Same deal for code mode: the engine and its JS port have to pass
      # their own code-mode scan (quoted mentions in comments are excused,
      # string literals are data - see the mention-vs-use note in noslop.py).
      - run: python noslop.py --no-config noslop.py web/detector.js

  # Detection quality, measured against the labeled corpus in eval/. Fails
  # if AUC, recall at the "worth a pass" threshold, or the false-positive
  # ceilings regress past the floors in eval/run_eval.py - so a change can't
  # buy recall by flagging human prose, and can't quietly lose recall either.
  eval-floors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - run: python eval/run_eval.py --check

  # The browser UI (web/) ships its own copy of the scorer in web/detector.js.
  # This proves it stays byte-for-byte in agreement with noslop.py, so the web
  # app can never quietly disagree with the CLI.
  web-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - run: node web/parity.js
