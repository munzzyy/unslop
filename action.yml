name: noslop
description: Flag the AI tells in your writing before you send it.
author: Cole Munz
branding:
  icon: edit-3
  color: gray-dark

inputs:
  paths:
    description: Files or glob patterns to check, space-separated (e.g. "docs/*.md README.md").
    required: true
  threshold:
    description: Score at/above which noslop exits non-zero.
    required: false
    default: "10"
  markdown:
    description: Treat all inputs as markdown (skip fenced/inline code) even if the extension isn't .md.
    required: false
    default: "false"
  python-version:
    description: Python version to run noslop with.
    required: false
    default: "3.x"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - shell: bash
      env:
        NOSLOP_PATHS: ${{ inputs.paths }}
        NOSLOP_THRESHOLD: ${{ inputs.threshold }}
        NOSLOP_MARKDOWN: ${{ inputs.markdown }}
        NOSLOP_SCRIPT: ${{ github.action_path }}/noslop.py
      run: |
        set -e
        args=()
        if [ "$NOSLOP_MARKDOWN" = "true" ]; then
          args+=(--markdown)
        fi
        args+=(--threshold "$NOSLOP_THRESHOLD")
        # $NOSLOP_PATHS stays unquoted: the input is a space-separated list.
        python "$NOSLOP_SCRIPT" "${args[@]}" $NOSLOP_PATHS
